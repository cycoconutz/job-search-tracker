name: Daily Job Search

on:
  schedule:
    # Runs at 13:00 UTC every day. Adjust as you like (cron is UTC).
    - cron: "0 13 * * *"
  workflow_dispatch: {}   # lets you trigger it manually from the Actions tab

permissions:
  contents: write

concurrency:
  group: daily-job-search
  cancel-in-progress: false

jobs:
  fetch-jobs:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run job search
        env:
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
        run: python fetch_jobs.py

      - name: Commit and push results
        run: |
          git config user.name "job-search-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "Nothing new to commit."
          else
            SUMMARY=$(cat data/.last_run_summary 2>/dev/null || echo "Daily job search update")
            git commit -m "Job search update: $SUMMARY"
            git pull --rebase origin main
            git push
          fi
